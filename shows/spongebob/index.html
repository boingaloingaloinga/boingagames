<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shows</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ece9e6, #ffffff);
      margin: 0;
      padding: 0;
      color: #333;
    }

    h1 {
      margin: 20px 0;
      font-size: 2.5rem;
      color: #222;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 30px;
      max-width: 1400px;
      margin: auto;
    }

    .movie {
      perspective: 1000px;
    }

    .movie a {
      display: block;
      border-radius: 15px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      transform-style: preserve-3d;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .movie a:hover {
      transform: rotateY(5deg) rotateX(5deg) translateY(-10px);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);
    }

    .movie img {
      width: 100%;
      height: 600px; /* taller for full movie poster */
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .movie a:hover img {
      transform: scale(1.05);
    }

    .movie-title {
      padding: 12px;
      font-weight: bold;
      background: #fff;
      transition: color 0.3s;
    }

    .movie a:hover .movie-title {
      color: #ff4c00;
    }

    /* Responsive tweaks */
    @media (max-width: 1300px) {
      .movie img {
        height: 500px;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .movie img {
        height: 400px;
      }
    }
  </style>
</head>
<body>
  <h1>Spongebob Squarepants</h1>
  <div class="container">
<div class="movie">
  <a href="s1e1.html">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/SpongeBob_SquarePants_Help_Wanted_title-card.jpg/250px-SpongeBob_SquarePants_Help_Wanted_title-card.jpg" alt="Help Wanted">
    <div class="movie-title">S1E1: Help Wanted</div>
  </a>
</div>
<body></body>
